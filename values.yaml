hub:
  extraVolumes:
    - name: user-list-vol
      configMap:
        name: user-list
  extraVolumeMounts:
    - name: user-list-vol
      mountPath: /etc/jupyterhub/custom
      readOnly: true

  extraConfig:
    myConfig: |
      import os
      user_file = '/etc/jupyterhub/custom/users.txt'
      if os.path.exists(user_file):
          with open(user_file, 'r') as f:
              file_users = {line.strip() for line in f if line.strip()}
              # This adds the file users to the existing allowed_users list
              c.Authenticator.allowed_users.update(file_users)

              c.Authenticator.allowed_users = allowed
              c.Authenticator.admin_users = {'admin'}
              c.NativeAuthenticator.import_from_config = True 
